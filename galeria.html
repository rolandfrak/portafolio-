    <style>
        .gallery-wrapper { 
            max-width: 1200px; 
            padding: 0 20px; 
            margin: 0 auto;
            margin-top: 0%; /* Respeta el menú superior fijo en móviles */
        }
        /* CARTA INFORMATIVA */
        .project-info-card {
            background: linear-gradient(135deg, #111827 0%, #1e293b 100%);
            border: 1px solid #334155;
            padding: 40px;
            border-radius: 16px;
            margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .info-title { font-size: 24pt; font-weight: 800; margin: 0 0 5px 0; color: #fff; }
        .info-org { font-size: 11pt; color: #3b82f6; font-weight: 700; text-transform: uppercase; margin-bottom: 20px; display: block; }
        .info-general { font-size: 13pt; color: #e2e8f0; line-height: 1.6; margin-bottom: 15px; }
        .info-detailed { font-size: 11pt; color: #94a3b8; line-height: 1.6; }
        .info-action-bar { margin-top: 25px; }
        .btn-inline { display: inline-block; width: auto; padding: 12px 25px; margin-right: 15px; }

        /* ESTILO NUEVO: BOTÓN DESHABILITADO POR EL ADMINISTRADOR */
        .btn-card.disabled-btn {
            background: #475569 !important; /* Gris pizarra opaco */
            border-color: #64748b !important;
            color: #94a3b8 !important;
            opacity: 0.6;                  /* Efecto traslúcido/atenuado */
            cursor: not-allowed !important; /* Cursor con signo de prohibición */
            box-shadow: none !important;
            transform: none !important;     /* Evita efectos de animación hover */
        }
    </style>
</head>

            const type = params.get("type");
            const projectId = params.get("project");
            const data = galleryData[projectId];

            if (!data) return;

            // 1. Pintar Carta Informativa Inicial
            const infoContainer = document.getElementById("info-card-container");
            let actionBtnHtml = '';
            if(type === 'web') {
                actionBtnHtml = `<div class="info-action-bar"><a href="${data.urlWeb}" target="_blank" class="btn-card primary-btn btn-inline"><i class="fa-solid fa-earth-americas"></i> Visitar Sitio Web Vivo</a></div>`;
            }
            
            infoContainer.innerHTML = `
                <div class="project-info-card">
                    <h1 class="info-title">${data.titulo}</h1>
                    <span class="info-org"><i class="fa-solid fa-id-card-clip"></i> ${data.organizacion}</span>
                    <p class="info-general">${data.general}</p>
                    <p class="info-detailed">${data.detallada}</p>
                    ${actionBtnHtml}
                </div>
            `;

            // 2. Pintar las tarjetas de la galería según su tipo y estado
            const grid = document.getElementById("gallery-grid");
            data.items.forEach(item => {
                const card = document.createElement("div");
                card.className = "portfolio-card";

                if (type === "web") {
                    let botonHTML = '';

                    // Evaluamos si el item viene configurado como deshabilitado
                    if (item.deshabilitado) {
                        botonHTML = `
                            <button class="btn-card disabled-btn" onclick="alert('Función Deshabilitada por el administrador.')">
                                <i class="fa-solid fa-ban"></i> Función Deshabilitada
                            </button>
                        `;
                    } else {
                        botonHTML = `
                            <a href="${item.urlSeccion}" target="_blank" class="btn-card primary-btn">
                                <i class="fa-solid fa-arrow-up-right-from-square"></i> Ver Sección Real
                            </a>
                        `;
                    }

                    card.innerHTML = `
                        <div class="card-image-scroll-box">
                            <img src="${item.img}" alt="${item.titulo}">
                        </div>
                        <div class="card-body">
                            <div class="tag-container">${item.tags.map(t=>`<span class="tech-tag">${t}</span>`).join('')}</div>
                            <h3 class="card-title">${item.titulo}</h3>
                            <p class="card-desc">${item.desc}</p>
                            <div class="card-actions">
                                ${botonHTML}
                            </div>
                        </div>
                    `;
                } else {
                    // Flujo por defecto para locales o diseño (Apertura de Lightbox)
                    card.innerHTML = `
                        <div class="card-image-box" style="cursor:pointer;">
                            <img src="${item.img}" alt="${item.titulo}" class="lightbox-trigger">
                        </div>
                        <div class="card-body">
                            <div class="tag-container">${item.tags ? item.tags.map(t=>`<span class="tech-tag">${t}</span>`).join('') : `<span class="tech-tag tool">Arte</span>`}</div>
                            <h3 class="card-title">${item.titulo}</h3>
                            <p class="card-desc">${item.desc}</p>
                            <div class="card-actions">
                                <button class="btn-card primary-btn lightbox-btn-action">
                                    <i class="fa-solid fa-expand"></i> Ver Tamaño Real
                                </button>
                            </div>
                        </div>
                    `;

                    const openLightbox = () => {
                        const lb = document.getElementById("portfolio-lightbox");
                        document.getElementById("lightbox-img").src = item.img;
                        document.getElementById("lightbox-caption").innerText = item.titulo + " - " + item.desc;
                        lb.classList.add("active");
                    };
                    card.querySelector(".card-image-box").addEventListener("click", openLightbox);
                    card.querySelector(".lightbox-btn-action").addEventListener("click", openLightbox);
                }
                grid.appendChild(card);
            });
        });
    </script>
    
    <script src="js/js-cabeza.js"></script>
</body>
</html>
